function useInstallPrompt(){
  const [deferred,setDeferred]=useState(null);
  const [installed,setInstalled]=useState(
    window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true);
  useEffect(()=>{
    const onPrompt=(e)=>{ e.preventDefault(); setDeferred(e); };
    const onInstalled=()=>setInstalled(true);
    window.addEventListener("beforeinstallprompt",onPrompt);
    window.addEventListener("appinstalled",onInstalled);
    return ()=>{ window.removeEventListener("beforeinstallprompt",onPrompt);
      window.removeEventListener("appinstalled",onInstalled); };
  },[]);
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const promptInstall = async ()=>{
    if(!deferred) return;
    deferred.prompt();
    await deferred.userChoice;
    setDeferred(null);
  };
  return { installed, isIOS, canPromptNative: !!deferred, promptInstall };
}

function InstallBanner(){
  const {installed,isIOS,canPromptNative,promptInstall} = useInstallPrompt();
  const [dismissed,setDismissed]=useState(false);
  if(installed || dismissed) return null;
  if(!canPromptNative && !isIOS) return null;
  return React.createElement("div",{style:{background:C.puL,border:`1px solid ${C.pu}30`,

}

      haisDb.ref("hais_data_v3/studentDepartments_v2").off(); };
  },[]);

  const combined = useMemo(()=>{
    if(hostelRoster===null || haisCustom===null) return null;
    const allClasses = new Set([...Object.keys(DEFAULT_STUDENTS),
      ...Object.keys(hostelRoster), ...Object.keys(haisCustom)]);
    const rows = [];
    allClasses.forEach(cls=>{
      const hostelList = hostelRoster[cls] !== undefined ? hostelRoster[cls] : (DEFAULT_STUDENTS[cls]||[]);
      const haisList = haisCustom[cls] !== undefined ? haisCustom[cls] : (DEFAULT_STUDENTS[cls]||[]);
      const names = new Set([...hostelList, ...haisList]);
      names.forEach(name=>{
        rows.push({
          key: normalizeName(name)+"|"+cls,
          name, cls,
          inHostel: hostelList.includes(name),
          inAcademic: haisList.includes(name),
          dept: haisDept[name]||null,
        });
      });
    });
    return rows.sort((a,b)=> a.name.localeCompare(b.name));
  },[hostelRoster,haisCustom,haisDept]);

  const filtered = useMemo(()=>{
    if(!combined) return [];
    const query = q.trim().toUpperCase();
    if(!query) return combined;
    return combined.filter(r=>r.name.includes(query));
  },[combined,q]);

  const mismatchCount = combined ? combined.filter(r=>!r.inHostel||!r.inAcademic).length : 0;

  return React.createElement("div",null,
    React.createElement(Card,null,
      React.createElement("div",{style:{fontWeight:700,fontSize:14,marginBottom:4}},"👨‍🎓 ইউনিফাইড ছাত্র প্রোফাইল"),
      React.createElement("div",{style:{fontSize:11.5,color:C.mu,lineHeight:1.6}},
        "হোস্টেল ও একাডেমিক — দুই ডেটাবেস থেকে লাইভ পড়ে একসাথে দেখানো হচ্ছে। ",
        "এখানে কোনো ডেটা সংরক্ষিত হয় না, শুধু প্রদর্শিত হয়।")),
    err && React.createElement(Card,{style:{background:C.reL,color:C.re,fontSize:12}}, err),
    !combined && !err && React.createElement(Card,null,"লোড হচ্ছে..."),
    combined && React.createElement("div",null,
      mismatchCount>0 && React.createElement(Card,{style:{background:"#fff8e1",border:"1px solid #e6cf9e"}},
        React.createElement("span",{style:{fontWeight:700,color:"#a9822f"}}, "⚠️ "+mismatchCount+" জন ছাত্র "),
        "শুধু একটি সিস্টেমে আছে — রোস্টার-সিঙ্ক ফাংশন চালু থাকলে শীঘ্রই মিলে যাবে।"),
      React.createElement("input",{type:"text",value:q,onChange:e=>setQ(e.target.value),
        placeholder:"নাম দিয়ে খুঁজুন...",
        style:{width:"100%",padding:"9px 12px",border:`1px solid ${C.bd}`,borderRadius:10,
          fontSize:13,marginBottom:10}}),
      React.createElement("div",{style:{fontSize:11,color:C.mu,marginBottom:8}},
        filtered.length+" জন ছাত্র"),
      React.createElement("div",null, filtered.slice(0,200).map(r=>
        React.createElement("div",{key:r.key, onClick:()=>setSelected(r),
          style:{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"9px 12px",background:"#fff",border:`1px solid ${C.bd}`,borderRadius:10,
            marginBottom:6,cursor:"pointer"}},
          React.createElement("div",null,
            React.createElement("div",{style:{fontWeight:600,fontSize:13}}, r.name),
            React.createElement("div",{style:{fontSize:10.5,color:C.mu}},
              "শ্রেণি "+r.cls+(CLASS_BN[r.cls]?" ("+CLASS_BN[r.cls]+")":""))),
          React.createElement("div",{style:{display:"flex",gap:4}},
            React.createElement("span",{style:{fontSize:10,fontWeight:700,padding:"2px 7px",
              borderRadius:10,background:r.inHostel?C.grL:C.reL,color:r.inHostel?C.gr:C.re}},
              r.inHostel?"🏠 হোস্টেল":"🏠 নেই"),
            React.createElement("span",{style:{fontSize:10,fontWeight:700,padding:"2px 7px",
              borderRadius:10,background:r.inAcademic?C.puL:C.reL,color:r.inAcademic?C.pu:C.re}},
              r.inAcademic?"📚 একাডেমিক":"📚 নেই")))))),
    selected && React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:16,zIndex:99},
      onClick:()=>setSelected(null)},
      React.createElement("div",{onClick:e=>e.stopPropagation(),
        style:{background:"#fff",borderRadius:16,padding:20,maxWidth:360,width:"100%"}},
        React.createElement("div",{style:{fontWeight:800,fontSize:16,color:C.pu,marginBottom:4}},selected.name),
        React.createElement("div",{style:{fontSize:12,color:C.mu,marginBottom:14}},
          "শ্রেণি "+selected.cls+(selected.dept?" • বিভাগ: "+selected.dept:"")),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          selected.inHostel && React.createElement("a",{href:CONFIG.HOSTEL_APP_URL,target:"_blank",rel:"noopener",
            style:{padding:"10px",borderRadius:10,background:C.goldL,color:C.gold,fontWeight:700,
              fontSize:12,textDecoration:"none",textAlign:"center"}},
            "🏠 হোস্টেল অ্যাপে বিস্তারিত দেখুন (নাম সার্চ করুন)"),
          selected.inAcademic && React.createElement("a",{href:CONFIG.HAIS_APP_URL,target:"_blank",rel:"noopener",
            style:{padding:"10px",borderRadius:10,background:C.puL,color:C.pu,fontWeight:700,
              fontSize:12,textDecoration:"none",textAlign:"center"}},
            "📚 একাডেমিক অ্যাপে বিস্তারিত দেখুন (নাম সার্চ করুন)")),
        React.createElement("button",{onClick:()=>setSelected(null),
          style:{width:"100%",marginTop:14,padding:"9px",borderRadius:10,border:`1px solid ${C.bd}`,
            background:"transparent",color:C.mu,fontWeight:600}}, "বন্ধ করুন"))));
}

/* ══════════ রোল ম্যানেজমেন্ট (শুধু অ্যাডমিন) ══════════ */
function RolesTab(){
  const [roles,setRoles]=useState(null);
  const [newEmail,setNewEmail]=useState("");
  const [msg,setMsg]=useState("");

  useEffect(()=>{
    haisDb.ref("app_roles").on("value", snap=>setRoles(snap.val()||{}));
    return ()=>haisDb.ref("app_roles").off();
  },[]);

  const setRoleField = (key, field, value)=>{
    haisDb.ref("app_roles/"+key+"/"+field).set(value);
  };
  const addNew = ()=>{
    if(!newEmail.trim()||!newEmail.includes("@")){ setMsg("সঠিক ইমেইল লিখুন"); return; }
    const key = emailKey(newEmail);
    haisDb.ref("app_roles/"+key).set({
      email: newEmail.trim().toLowerCase(),
      canAccessHostel: false, canAccessAcademic: false, isAdmin: false,
    });
    setNewEmail(""); setMsg("✅ যোগ করা হয়েছে — নিচে গিয়ে অ্যাক্সেস টিক দিন");
  };

  return React.createElement("div",null,
    React.createElement(Card,null,
      React.createElement("div",{style:{fontWeight:700,fontSize:14,marginBottom:8}},"🔑 রোল ম্যানেজমেন্ট"),
      React.createElement("div",{style:{display:"flex",gap:8,marginBottom:6}},
        React.createElement("input",{type:"email",value:newEmail,onChange:e=>setNewEmail(e.target.value),
          placeholder:"নতুন ইমেইল যোগ করুন...",
          style:{flex:1,padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:12}}),
        React.createElement("button",{onClick:addNew,
          style:{padding:"8px 16px",borderRadius:8,border:"none",background:C.pu,color:"#fff",
            fontWeight:700,fontSize:12}},"যোগ করুন")),
      msg && React.createElement("div",{style:{fontSize:11,color:C.pu,fontWeight:600}},msg)),
    !roles && React.createElement(Card,null,"লোড হচ্ছে..."),
    roles && Object.entries(roles).map(([key,r])=>{
      const fields = [["canAccessHostel","🏠 হোস্টেল"],["canAccessAcademic","📚 একাডেমিক"],["isAdmin","👑 অ্যাডমিন"]];
      const checkboxes = fields.map(([field,label])=>
        React.createElement("label",{key:field,
          style:{display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer"}},
          React.createElement("input",{type:"checkbox",checked:!!r[field],
            onChange:e=>setRoleField(key,field,e.target.checked)}),
          label)
      );
      return React.createElement(Card,{key},
        React.createElement("div",{style:{fontWeight:700,fontSize:13,marginBottom:8}}, r.email),
        React.createElement("div",{style:{display:"flex",gap:14,flexWrap:"wrap"}}, checkboxes));
    }));
}


/* ══════════ রুট অ্যাপ ══════════ */
function App(){
  const [user,setUser]=useState(undefined); // undefined = লোড হচ্ছে, null = লগইন নেই
  const [role,setRole]=useState(undefined);

  useEffect(()=>{
    return auth.onAuthStateChanged(u=>{
      setUser(u||null);
      if(!u){ setRole(undefined); return; }
      const key = emailKey(u.email);
      haisDb.ref("app_roles/"+key).once("value").then(snap=>{
        setRole(snap.val()||null);
      });
    });
  },[]);

  if(user===undefined || (user && role===undefined)){
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",
      justifyContent:"center",color:C.mu}}, "লোড হচ্ছে...");
  }
  if(!user){
    return React.createElement(LoginScreen,{onLogin:setUser});
  }
  if(!role){
    return React.createElement(NoRoleScreen,{user, onLogout:()=>auth.signOut()});
  }
  return React.createElement(Dashboard,{user, role, onLogout:()=>auth.signOut()});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
